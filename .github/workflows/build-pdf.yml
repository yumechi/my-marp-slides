name: Build PDF Slides

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to checkout'
        required: true
        default: 'main'
        type: string
      slide_name:
        description: 'Slide directory name'
        required: true
        default: 'sample'
        type: choice
        options:
          - sample
          - 20260123

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build custom Marp image
        run: |
          podman build -t marp-slides-jp:latest -f Containerfile .

      - name: Create output directory
        run: |
          mkdir -p slides
          chmod 777 slides

      - name: Build PDF
        run: |
          SLIDE_NAME="${{ inputs.slide_name }}"
          SRC_SLIDE_DIR="src/${SLIDE_NAME}"
          MD_FILE="${SRC_SLIDE_DIR}/slides.md"
          
          # Generate timestamp in yyyymmddhhmmss format
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          
          # Validate slide directory and file
          if [ ! -d "$SRC_SLIDE_DIR" ]; then
            echo "Error: Directory not found: ${SRC_SLIDE_DIR}"
            exit 1
          fi
          
          if [ ! -f "$MD_FILE" ]; then
            echo "Error: slides.md not found in ${SRC_SLIDE_DIR}"
            exit 1
          fi
          
          # Check for custom.css
          # This handles both @import references and theme: custom-* usage.
          THEME_OPT=""
          CUSTOM_CSS_HOST_PATH="${SRC_SLIDE_DIR}/assets/custom.css"
          CUSTOM_CSS_CONTAINER_PATH="/src/assets/custom.css"
          if [ -f "${CUSTOM_CSS_HOST_PATH}" ]; then
            THEME_OPT="--theme-set ${CUSTOM_CSS_CONTAINER_PATH}"
          fi
          
          # Build PDF with timestamp in filename
          PDF_FILENAME="${SLIDE_NAME}-${TIMESTAMP}.pdf"
          podman run --rm \
            --security-opt label=disable \
            --user root \
            -v "$(pwd)/${SRC_SLIDE_DIR}:/src:ro" \
            -v "$(pwd)/slides:/out:rw" \
            -w /src \
            marp-slides-jp:latest \
            ${THEME_OPT} \
            --pdf \
            --allow-local-files \
            "slides.md" \
            -o "/out/${PDF_FILENAME}"
          
          # Fix ownership to runner user
          sudo chown $USER:$USER "slides/${PDF_FILENAME}"
          
          # Save filename for next step
          echo "PDF_FILENAME=${PDF_FILENAME}" >> $GITHUB_ENV

      - name: Upload PDF artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.slide_name }}-pdf-${{ env.TIMESTAMP }}
          path: slides/${{ env.PDF_FILENAME }}
          retention-days: 1
